name: Deploy to GitHub Pages

on:
  push:
    branches: [main, balancer-wrapper-expansion]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_DUNE_API_KEY:                  ${{ secrets.VITE_DUNE_API_KEY }}
          VITE_DUNE_QUERY_ID:                 ${{ secrets.VITE_DUNE_QUERY_ID }}
          VITE_DUNE_VOLUME_QUERY_ID:          ${{ secrets.VITE_DUNE_VOLUME_QUERY_ID }}
          VITE_DUNE_SOURCE_QUERY_ID:          ${{ secrets.VITE_DUNE_SOURCE_QUERY_ID }}
          VITE_DUNE_BALANCER_SOURCE_QUERY_ID: ${{ secrets.VITE_DUNE_BALANCER_SOURCE_QUERY_ID }}
      - name: Add .nojekyll
        run: touch dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
